<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" href="/static/icono.ico" type="image/ico">
    <!-- LINK AL CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css')}}">
</head>
<body>
    <!-- NAVBAR -->
    <!-- la dejamos en el layout porque independientemente de la seccion va a ser igual -->
    <nav>
        <div><strong class="titulo">Gestor de Gastos</strong></div>
        <div>
            <a href="/">Inicio</a>
            <a href="/agregar_datos">Agregar</a>
        </div>
    </nav>
    <!-- cambia segun la seccion que estemos -->
    {% block body %}
    {% endblock %}
    <footer class="footer">
        <h2 class="footer_title">Gestor de gastos</h2>
        <div class="contenedor_a">
            <a class="buttom_footer" href="/">Inicio</a>
            <a class="buttom_footer" href="/agregar_datos">Agregar</a>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='js/layout.js')}}"></script>
</body>
</html>
