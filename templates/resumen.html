{% extends './layout.html' %}

{% block title %}Gestor de gastos{% endblock %}

{% block body %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.js"></script>
<h1 class="titulo_resumen">Resumen de datos</h1>
<div class="seccion">
    <div class="contenido">
        <div class="grafico">
            <canvas id="gastos"></canvas>
        </div>
        <div class="resumen_chart">
            <h2>Gastos</h2>
            <p>Resumen de gastos...</p>
        </div>
    </div>
</div>

<div class="seccion">
    <div class="contenido">
        <div class="grafico">
            <canvas id="ingresos"></canvas>
        </div>
        <div class="resumen_chart">
            <h2>Ingresos</h2>
            <p>Resumen de ingresos...</p>
        </div>
    </div>
</div>

<div class="seccion">
    <div class="contenido">
        <div class="grafico">
            <canvas id="balance"></canvas>
        </div>
        <div class="resumen_chart">
            <h2>Balance</h2>
            <p>Resumen de balance...</p>
        </div>
    </div>
</div>
<script>
    window.datos_gastos = {{ cat_gastos | tojson | safe }};
    window.datos_ingresos = {{ cat_ingresos | tojson | safe }};
    window.datos_totales = {{ totales | tojson | safe }};
</script>
<script src="{{ url_for('static', filename='js/resumen.js') }}"></script>
{% endblock %}
